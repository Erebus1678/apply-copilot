# Apply Copilot — provider-agnostic + token-saver loop (foundation-first).
# SaaS (auth/billing/metering/hosted keys) and deploy are OUT of scope here.
#
# Deliveries (each = one gated commit):
#   D1 provider-registry   Agnostic registry: local/openai/anthropic/openrouter/groq/together/ollama
#   D2 toggler-rework      ProviderSwitcher: all providers + BYO-key + model dropdown + health dot
#   D3 prompt-compression  Built-in deterministic compaction of JD/CV before send (RTK-style)
#   D4 compress-proxy      Optional external /v1/compress proxy hook (Headroom-style), off by default
#   D5 provider-readme     README: every provider setup + both compression modes + self-host env table
version: 1
meta:
  name: apply-copilot-providers
  description: Make Apply Copilot fully provider-agnostic with token-saver compression; SaaS deferred.
  author: dmytro
  created: 2026-06-26

goal:
  statement: >
    Make Apply Copilot provider-agnostic (local, OpenAI, Anthropic, OpenRouter, Groq, Together,
    Ollama), rework the provider toggler (BYO-key, model dropdown, health), add built-in prompt
    compression and an optional external compress proxy, and document every self-host setup.
  scope: >
    Foundation only. SaaS (auth, billing, usage metering, hosted OpenRouter keys) and deploy are
    explicitly OUT of scope and handled as a later epic.
  context_sources:
    - file: E:\projects\apply-copilot
    - file: C:\Users\furym\.claude\projects\E--projects\memory\apply-copilot-build.md
  definition_of_done: >
    All five deliveries implemented with small diffs following existing patterns, every gate green
    (typecheck, lint, test:coverage 80/70/78/80, build), each passed ECC review with no
    CRITICAL/HIGH, and each committed. SaaS and deploy are NOT part of done.
  verification:
    - id: typecheck
      type: programmatic
      check: ["pnpm", "typecheck"]
      expect: exit_zero
    - id: lint
      type: programmatic
      check: ["pnpm", "lint"]
      expect: exit_zero
    - id: tests
      type: programmatic
      check: ["pnpm", "test:coverage"]
      expect: exit_zero
    - id: build
      type: programmatic
      check: ["pnpm", "build"]
      expect: exit_zero
    - id: review
      type: judge
      rubric: >
        Follows existing patterns; validates input at trust boundaries; handles errors; no secrets
        logged or committed; BYO-key and external-proxy egress are safe and off-by-default where
        applicable; no CRITICAL or HIGH issues.
    - id: feature-signoff
      type: human
      prompt: "Delivery committed and gates green — proceed to the next delivery?"

host:
  cli: claude
  model: default
  invoke: ["claude", "-p"]
  timeout_sec: 900

council:
  - id: react-reviewer
    role: judge
    cli: claude
    model: default
    invoke: ["claude", "-p"]
    timeout_sec: 600
    scope: [delivery]
    local: true
  - id: code-reviewer
    role: judge
    cli: claude
    model: default
    invoke: ["claude", "-p"]
    timeout_sec: 600
    scope: [delivery]
    local: true

gates:
  plan_gate:
    when: after_plan
    members: [code-reviewer]
    verdict_policy: revise_until_clean
    verdict_source: code-reviewer
    criteria: [review]
    max_revisions: 2
  delivery_gate:
    when: after_each_delivery
    members: [react-reviewer, code-reviewer]
    verdict_policy: revise_until_clean
    verdict_source: code-reviewer
    criteria: [typecheck, lint, tests, build, review]
    max_revisions: 3

loop_control:
  max_iterations: 8
  budget:
    wall_clock_min: 300
  no_progress:
    max_stalled_iterations: 2
    signals:
      - same gate failure repeats with no material code change
      - delivery has no committed diff
      - reviewer findings unchanged after a revision
    action: stop
  human_checkpoints:
    - confirm after each delivery commit before moving on
  stop_conditions:
    - all five deliveries pass their gate clean and are committed
    - max_iterations reached
    - same blocker repeats for 2 iterations
    - wall_clock budget exceeded

execution:
  mode: in_session
  isolation: current_workspace
  side_effects:
    requires_approval: true
    duplicate_action_check: true

observability:
  state_file: state.json
  run_log: run-log.md
  checkpoint_granularity: gate

privacy:
  egress: []   # council runs in-session (local); the external compress proxy is a runtime,
               # user-configured, off-by-default option, not a loop egress.

workspace:
  dir: ./loop-workspace
  layout: [plan.md, "delivery-{n}.md", "review-{n}.md", state.json, run-log.md]
