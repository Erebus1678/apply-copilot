allowBuilds:
  esbuild: true
  sharp: true
  tesseract.js: false
  unrs-resolver: true

# Force patched versions of transitive deps with moderate CVEs (dev/build-time).
# js-yaml 3.15.0 patches the DoS within the 3.x line, and satisfies the
# ^3.13.1 that jest/istanbul (@istanbuljs/load-nyc-config) pins — so no 4.x
# API break. All three are build/dev-time only, never in the runtime bundle.
overrides:
  postcss@<8.5.10: ">=8.5.10"
  esbuild@<0.24.3: ">=0.24.3"
  js-yaml@<3.15.0: "3.15.0"
