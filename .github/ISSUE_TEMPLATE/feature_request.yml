name: Feature request
description: Suggest an idea or improvement
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The use case or pain point — not just the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like to see. Sketches/links welcome.
  - type: checkboxes
    id: edition-fit
    attributes:
      label: Edition fit
      description: See EDITIONS.md — the OSS edition stays self-hostable, no fork.
      options:
        - label: This keeps the OSS edition usable without an account / hosted service
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
