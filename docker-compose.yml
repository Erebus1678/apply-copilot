# Self-host Apply Copilot with one command — app only, embedded local database.
#
#   docker compose up -d --build      # then open http://localhost:3000
#
# Zero config: no database service and no migration step. The app uses an
# embedded PGlite database persisted in the `app-data` volume and auto-migrates
# on first boot. AI is provider-agnostic and can be chosen in the header (bring
# your own key per device) — or point it at a local model on the host with the
# envs below. Nothing has to leave your machine.
#
# Share on your LAN: the container listens on 0.0.0.0, so anyone on your network
# can open http://<your-machine-ip>:3000 and pick their own profile.
#
# Prefer a shared Postgres over embedded PGlite? Set DATABASE_URL (and DIRECT_URL)
# to your Postgres instance — the app switches drivers automatically. See
# README → "Self-hosting & LAN sharing".
services:
  app:
    build: .
    restart: unless-stopped
    ports:
      - "3000:3000" # published on all interfaces → reachable from your LAN
    environment:
      # AI provider is optional — you can also choose it in the header per device.
      AI_PROVIDER: ${AI_PROVIDER:-local}
      # Reach an LM Studio (or any OpenAI-compatible server) running on the host.
      LOCAL_AI_BASE_URL: ${LOCAL_AI_BASE_URL:-http://host.docker.internal:1234/v1}
      LOCAL_AI_MODEL: ${LOCAL_AI_MODEL:-qwen/qwen3-coder-30b}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      # Embedded PGlite lives here; the named volume keeps it across restarts.
      # Set DATABASE_URL instead to use a shared Postgres server.
      DATABASE_URL: ${DATABASE_URL:-}
      PGLITE_PATH: /app/data/pgdata
    volumes:
      - app-data:/app/data
    extra_hosts:
      - "host.docker.internal:host-gateway" # Linux: resolve the host machine

volumes:
  app-data:
